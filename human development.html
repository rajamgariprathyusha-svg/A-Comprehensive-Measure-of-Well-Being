<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HDI Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 40px; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 8px; max-width: 450px; margin: auto; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        input[type="number"] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        input[type="submit"] { background-color: #2ecc71; color: white; border: none; padding: 12px; width: 95%; border-radius: 4px; cursor: pointer; font-size: 16px; }
        input[type="submit"]:hover { background-color: #27ae60; }
        .result { margin-top: 20px; font-weight: bold; color: #2c3e50; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Human Development Index Predictor</h2>
        <form action="/predict" method="post">
            <input type="number" name="income" placeholder="Income Index (e.g., 0.85)" step="0.001" min="0" max="1" required>
            <input type="number" name="life_exp" placeholder="Life Expectancy Index (e.g., 0.90)" step="0.001" min="0" max="1" required>
            <input type="number" name="education" placeholder="Education Index (e.g., 0.88)" step="0.001" min="0" max="1" required>
            <input type="submit" value="Predict HDI">
        </form>
        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
